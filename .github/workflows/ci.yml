name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Swr.Net.slnx

      - name: Build
        run: dotnet build Swr.Net.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Swr.Net.slnx -c Release --no-build --verbosity normal

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack src/Swr.Net/Swr.Net.csproj -c Release

      - name: Push to NuGet
        run: |
          dotnet nuget push "src/Swr.Net/bin/Release/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "src/Swr.Net/bin/Release/*.snupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src/Swr.Net/bin/Release/Swr.Net.*.nupkg
            src/Swr.Net/bin/Release/Swr.Net.*.snupkg
